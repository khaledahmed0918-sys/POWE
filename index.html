<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="POWR Clan - The leading organization in content creation and eSports" />
    <title>POWR Clan | باور</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://i.postimg.cc" />
    <style>
      /* Critical CSS to prevent FOUC and layout shift */
      body { background: #000; margin: 0; }
      #root { min-height: 100vh; }
    </style>
    <script>
      // Performance and error handling script
      window.addEventListener('error', function(e) {
        if (e.message === 'ResizeObserver loop completed with undelivered notifications.') {
          const resizeObserverErrDiv = document.getElementById('webpack-dev-server-client-overlay-div');
          if (resizeObserverErrDiv) resizeObserverErrDiv.style.display = 'none';
          e.stopImmediatePropagation();
        }
      });
      
      // Force scroll to top on refresh
      window.onbeforeunload = function () {
        window.scrollTo(0, 0);
      };
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
